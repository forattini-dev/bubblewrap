name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v0.11.1)"
        required: true
        default: "v0.11.1"
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
            target: linux-x86_64
          - os: ubuntu-24.04-arm
            arch: aarch64
            target: linux-aarch64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build libcap-dev pkg-config

      - name: Build bubblewrap
        run: |
          meson setup build --buildtype=release --prefer-static -Dselinux=disabled
          ninja -C build
          strip build/bwrap

      - name: Verify binary
        run: |
          ./build/bwrap --version
          file ./build/bwrap
          ls -la ./build/bwrap

      - name: Rename binary with platform suffix
        run: cp build/bwrap bwrap-${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bwrap-${{ matrix.target }}
          path: bwrap-${{ matrix.target }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "bubblewrap ${{ steps.version.outputs.tag }}"
          body: |
            Pre-built bubblewrap binaries for use with [fifony](https://github.com/forattini-dev/fifony) sandbox execution.

            ## Download
            ```bash
            # Linux x86_64
            curl -fsSL -o bwrap https://github.com/forattini-dev/bubblewrap/releases/latest/download/bwrap-linux-x86_64
            chmod +x bwrap

            # Linux aarch64
            curl -fsSL -o bwrap https://github.com/forattini-dev/bubblewrap/releases/latest/download/bwrap-linux-aarch64
            chmod +x bwrap
            ```
          files: |
            artifacts/bwrap-linux-x86_64/bwrap-linux-x86_64
            artifacts/bwrap-linux-aarch64/bwrap-linux-aarch64
          generate_release_notes: false
